model_name: gemini/gemini-3-flash-preview
dot_global_config_health_check: true
DEV_ENV: dev

example_parent:
  example_child: "example_value"

########################################################
# LLMs
########################################################
default_llm:
  default_model: gemini/gemini-3-flash-preview
  fallback_model: gemini/gemini-2.5-flash-preview
  fast_model: gemini/gemini-2.5-flash
  cheap_model: gemini/gemini-2.5-flash
  default_temperature: 0.5
  default_max_tokens: 100000

llm_config:
  cache_enabled: false
  retry:
    max_attempts: 3
    min_wait_seconds: 1
    max_wait_seconds: 5
  timeout:
    # API request timeout (seconds) - how long to wait for LLM API response
    api_timeout_seconds: 120
    # Connection timeout (seconds) - how long to wait to establish connection
    connect_timeout_seconds: 10

########################################################
# Agent chat
########################################################
agent_chat:
  history_message_limit: 20
  # Streaming configuration
  streaming:
    # Send heartbeat comments every N seconds to prevent client timeout
    heartbeat_interval_seconds: 15
    # Maximum time to wait for first token from LLM (seconds)
    first_token_timeout_seconds: 60
    # Maximum time for entire streaming operation (seconds)
    max_streaming_duration_seconds: 300

########################################################
# Debugging
########################################################
features:
  # Add feature flags here. Can be overridden by env vars: FEATURES__NEW_UI=true
  new_ui: false
  beta_features: false
  enable_llm_fallback: true

logging:
  verbose: true
  format:
    show_time: false
    show_session_id: true
    location:
      enabled: true
      show_file: true
      show_function: true
      show_line: true
      # Configure which log levels show location information
      show_for_info: false
      show_for_debug: true
      show_for_warning: true
      show_for_error: true
  levels:
    debug: false  # Disable debug logs
    info: true    # Show info logs
    warning: true # Show warning logs
    error: true   # Show error logs
    critical: true # Show critical logs
  redaction:
    enabled: true
    use_default_pii: true
    patterns:
      - name: "ANTHROPIC_API_KEY"
        regex: "sk-ant-[a-zA-Z0-9-]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "OPENAI_API_KEY"
        regex: "sk-[a-zA-Z0-9]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "STRIPE_API_KEY"
        regex: "[spr]k_(live|test)_[a-zA-Z0-9]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "BEARER_TOKEN"
        regex: "Bearer\\s+[a-zA-Z0-9._\\-]{20,}"
        placeholder: "[REDACTED_BEARER_TOKEN]"
      - name: "GENERIC_KEY"
        regex: "(?i:(?:api[_-]?key|project[_-]?key|secret[_-]?key)[=:\\s]+['\"]?[a-zA-Z0-9_\\-]{16,}['\"]?)"
        placeholder: "[REDACTED_KEY]"

########################################################
# Subscription
########################################################
subscription:
  stripe:
    price_ids:
      test: price_1SaeJ4Kugya9tlosOgMWuJfi
      prod: ""  # TODO: Set production price ID
  metered:
    included_units: 1000
    overage_unit_amount: 1  # $0.01 per unit
    unit_label: "units"
  trial_period_days: 7
  payment_retry:
    max_attempts: 3

########################################################
# Stripe
########################################################
stripe:
  api_version: "2024-11-20.acacia"
  webhook:
    url: "https://python-saas-template-dev.up.railway.app"

########################################################
# Telegram
########################################################
telegram:
  chat_ids:
    admin_alerts: "1560836485"
    test: "1560836485"

########################################################
# Server
########################################################
server:
  allowed_origins:
    - "http://localhost:8080"
